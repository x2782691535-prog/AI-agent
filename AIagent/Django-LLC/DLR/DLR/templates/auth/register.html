<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI 智能助手</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @layer utilities {
            .auth-container {
                @apply min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4;
            }
            .auth-card {
                @apply bg-white rounded-2xl shadow-xl p-8 w-full max-w-md;
            }
            .auth-input {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300;
            }
            .auth-button {
                @apply w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 flex items-center justify-center;
            }
            .auth-link {
                @apply text-green-600 hover:text-green-800 transition-colors duration-300;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo和标题 -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-50 rounded-full mb-4">
                    <svg width="60" height="60" viewBox="0 0 40 40" class="transform hover:scale-110 transition-transform duration-300">
                        <defs>
                            <linearGradient id="registerLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
                            </linearGradient>
                        </defs>

                        <!-- 机器人身体 -->
                        <rect x="8" y="12" width="24" height="20" rx="6" ry="6" fill="url(#registerLogoGradient)"/>

                        <!-- 机器人头部 -->
                        <rect x="12" y="6" width="16" height="12" rx="4" ry="4" fill="url(#registerLogoGradient)"/>

                        <!-- 眼睛 -->
                        <circle cx="16" cy="11" r="2" fill="white"/>
                        <circle cx="24" cy="11" r="2" fill="white"/>
                        <circle cx="16" cy="11" r="1" fill="#059669"/>
                        <circle cx="24" cy="11" r="1" fill="#059669"/>

                        <!-- 嘴巴 -->
                        <rect x="18" y="14" width="4" height="1" rx="0.5" fill="white"/>

                        <!-- 天线 -->
                        <line x1="20" y1="6" x2="20" y2="3" stroke="url(#registerLogoGradient)" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="20" cy="3" r="1.5" fill="#F59E0B"/>

                        <!-- 手臂 -->
                        <rect x="4" y="18" width="6" height="3" rx="1.5" fill="url(#registerLogoGradient)"/>
                        <rect x="30" y="18" width="6" height="3" rx="1.5" fill="url(#registerLogoGradient)"/>

                        <!-- 装饰线条 -->
                        <line x1="10" y1="25" x2="14" y2="25" stroke="white" stroke-width="1" stroke-linecap="round"/>
                        <line x1="26" y1="25" x2="30" y2="25" stroke="white" stroke-width="1" stroke-linecap="round"/>

                        <!-- 加号图标（表示注册） -->
                        <circle cx="32" cy="8" r="3" fill="#F59E0B"/>
                        <line x1="30.5" y1="8" x2="33.5" y2="8" stroke="white" stroke-width="1" stroke-linecap="round"/>
                        <line x1="32" y1="6.5" x2="32" y2="9.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">创建账户</h1>
                <p class="text-gray-600">加入AI助手，开始智能对话</p>
            </div>

            <!-- 注册表单 -->
            <form id="register-form">
                {% csrf_token %}
                
                <!-- 用户名 -->
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        <i class="fa fa-user mr-2"></i>用户名
                    </label>
                    <input type="text" id="username" name="username" class="auth-input" placeholder="请输入用户名" required>
                    <p class="text-xs text-gray-500 mt-1">用户名将用于登录，建议使用字母和数字</p>
                </div>

                <!-- 邮箱 -->
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        <i class="fa fa-envelope mr-2"></i>邮箱
                    </label>
                    <input type="email" id="email" name="email" class="auth-input" placeholder="请输入邮箱地址" required>
                </div>

                <!-- 昵称 -->
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        <i class="fa fa-id-card mr-2"></i>昵称（可选）
                    </label>
                    <input type="text" id="nickname" name="nickname" class="auth-input" placeholder="请输入昵称">
                </div>

                <!-- 密码 -->
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        <i class="fa fa-lock mr-2"></i>密码
                    </label>
                    <div class="relative">
                        <input type="password" id="password" name="password" class="auth-input pr-12" placeholder="请输入密码" required>
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">密码长度至少6位</p>
                </div>

                <!-- 确认密码 -->
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        <i class="fa fa-lock mr-2"></i>确认密码
                    </label>
                    <div class="relative">
                        <input type="password" id="confirm-password" name="confirm_password" class="auth-input pr-12" placeholder="请再次输入密码" required>
                        <button type="button" id="toggle-confirm-password" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- 注册按钮 -->
                <button type="submit" id="register-btn" class="auth-button">
                    <span id="register-text">注册</span>
                    <i id="register-loading" class="fa fa-spinner fa-spin ml-2 hidden"></i>
                </button>

                <!-- 错误提示 -->
                <div id="error-message" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm hidden">
                    <i class="fa fa-exclamation-circle mr-2"></i>
                    <span id="error-text"></span>
                </div>

                <!-- 成功提示 -->
                <div id="success-message" class="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm hidden">
                    <i class="fa fa-check-circle mr-2"></i>
                    <span id="success-text"></span>
                </div>

                <!-- 登录链接 -->
                <div class="mt-6 text-center">
                    <span class="text-gray-600">已有账户？</span>
                    <a href="/auth/login/" class="auth-link font-medium">立即登录</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const registerBtn = document.getElementById('register-btn');
            const registerText = document.getElementById('register-text');
            const registerLoading = document.getElementById('register-loading');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const successMessage = document.getElementById('success-message');
            const successText = document.getElementById('success-text');

            // 密码显示/隐藏切换
            function setupPasswordToggle(toggleId, inputId) {
                const toggle = document.getElementById(toggleId);
                const input = document.getElementById(inputId);
                
                toggle.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    
                    const icon = this.querySelector('i');
                    icon.className = type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
                });
            }

            setupPasswordToggle('toggle-password', 'password');
            setupPasswordToggle('toggle-confirm-password', 'confirm-password');

            // 表单提交
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const nickname = document.getElementById('nickname').value.trim();
                const password = document.getElementById('password').value.trim();
                const confirmPassword = document.getElementById('confirm-password').value.trim();

                // 基本验证
                if (!username || !email || !password || !confirmPassword) {
                    showError('请填写完整信息');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('两次输入的密码不一致');
                    return;
                }

                if (password.length < 6) {
                    showError('密码长度至少6位');
                    return;
                }

                // 显示加载状态
                setLoading(true);
                hideMessages();

                try {
                    const response = await fetch('/auth/api/register/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            nickname: nickname,
                            password: password,
                            confirm_password: confirmPassword
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showSuccess(data.message);
                        // 3秒后跳转到登录页
                        setTimeout(() => {
                            window.location.href = '/auth/login/';
                        }, 3000);
                    } else {
                        showError(data.message || '注册失败');
                    }
                } catch (error) {
                    console.error('注册请求失败:', error);
                    showError('网络错误，请稍后重试');
                } finally {
                    setLoading(false);
                }
            });

            function setLoading(loading) {
                registerBtn.disabled = loading;
                if (loading) {
                    registerText.textContent = '注册中...';
                    registerLoading.classList.remove('hidden');
                    registerBtn.classList.add('opacity-75', 'cursor-not-allowed');
                } else {
                    registerText.textContent = '注册';
                    registerLoading.classList.add('hidden');
                    registerBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }

            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.remove('hidden');
                successMessage.classList.add('hidden');
            }

            function showSuccess(message) {
                successText.textContent = message;
                successMessage.classList.remove('hidden');
                errorMessage.classList.add('hidden');
            }

            function hideMessages() {
                errorMessage.classList.add('hidden');
                successMessage.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
